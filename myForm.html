<body>
    <h1>SignUp</h1>
    <section id="default">
        <h2>Please complete all the fields</h2>
        <fieldset>
            <legend>All fields are compulsory</legend>
            <form id="SignUp">
            <label>UserName: </label>
            <input type="text" placeholder="What is your Username" name="UserName"
            id="UserName">
            <label>Password:</label>
            <input type="password" id="password" name="password">
            <label>Gender:</label>
            <input type="radio" id="male" checked name="Gender" value="male">
            <label for="male">Male:</label>
            <input type="radio" id="female" name="Gender" value="female">
            <label for="female">Female:</label>
            <label>Upload File</label>:<input type="file">
            <br>
            <button>Submit</button>
        </form>
    </fieldset>
</section>
</body>
